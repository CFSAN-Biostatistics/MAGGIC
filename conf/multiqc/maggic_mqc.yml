title: CPIPES Report
intro_text: >
    CPIPES (CFSAN PIPELINES) is a modular bioinformatics data analysis project at HFP, FDA based on NEXTFLOW DSL2.
report_comment: >
    This report has been generated by the <a href="https://github.com/CFSAN-Biostatistics/maggic/blob/master/readme/Workflow_Name_Placeholder.md" target="_blank">CPIPES - Workflow_Name_Placeholder</a>
    analysis pipeline. Only certain tables and plots are reported here. For complete results, please refer to the analysis pipeline output directory.
report_header_info:
    - CPIPES Version: CPIPES_Version_Placeholder
    - Workflow: Workflow_Name_Placeholder
    - Workflow Version: Workflow_Version_Placeholder
    - Conceived By: "Kranti Konganti"
    - Input Directory: Workflow_Input_Placeholder
    - Output Directory: Workflow_Output_Placeholder
show_analysis_paths: false
show_analysis_time: false
skip_versions_section: true
disable_version_detection: true
show_version_header: false
report_section_order:
    MAGGIC-RESULTS_collated_table:
        order: -897
    MAGGIC-SKIPPEDBINS_collated_table:
        order: -898
    MAGGIC-GLOBALABUNDANCE_collated_table:
        order: -899
    filtlong:
        order: -996
    fastp:
        order: -997
    fastqc:
        order: -998
    software_versions:
        order: -999

export_plots: true

# Run only these modules
run_modules:
    - fastp
    - filtlong
    - fastqc
    - custom_content

# Override module display properties via mod_cust_config
# Fields overrideable: name, info, extra, url, doi, href
module_order:
    - fastp:
          name: "fastp"
          info: "This section of the report shows read statistics <b>before</b> and <b>after</b> adapter trimming with <code>fastp</code> on SE, merged PE or concatenated PE reads."
          extra: ""
    - fastqc:
          name: "FastQC"
          info: "This section of the report shows FastQC results <b>before</b> adapter trimming on SE, merged PE or concatenated PE reads."
          extra: ""
