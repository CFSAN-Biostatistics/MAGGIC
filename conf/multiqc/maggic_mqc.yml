title: CPIPES Report
intro_text: >
    CPIPES (CFSAN PIPELINES) is a modular bioinformatics data analysis project at HFP, FDA based on NEXTFLOW DSL2.
report_comment: >
    This report has been generated by the <a href="https://github.com/CFSAN-Biostatistics/maggic/blob/master/readme/Workflow_Name_Placeholder.md" target="_blank">CPIPES - Workflow_Name_Placeholder</a>
    analysis pipeline. Only certain tables and plots are reported here. For complete results, please refer to the analysis pipeline output directory.
report_header_info:
    - CPIPES Version: CPIPES_Version_Placeholder
    - Workflow: Workflow_Name_Placeholder
    - Workflow Version: Workflow_Version_Placeholder
    - Conceived By: "Kranti Konganti"
    - Input Directory: Workflow_Input_Placeholder
    - Output Directory: Workflow_Output_Placeholder
show_analysis_paths: false
show_analysis_time: false
skip_versions_section: true
disable_version_detection: true
show_version_header: false
report_section_order:
    MAGGIC-RESULTS-DATASUM_datasum_summary:
        order: -895
    maggic-wand:
        order: -896
    MAGGIC-RESULTS-CHROMOSOME_collated_table:
        order: -897
    MAGGIC-RESULTS-PLASMID_collated_table:
        order: -898
    MAGGIC-RESULTS-VIRUS_collated_table:
        order: -899
    MAGGIC-RESULTS_collated_table:
        order: -900
    MAGGIC-SKIPPEDBINS_collated_table:
        order: -901
    MAGGIC-GLOBALABUNDANCE_collated_table:
        order: -902
    filtlong:
        order: -996
    fastp:
        order: -997
    fastqc:
        order: -998
    software_versions:
        order: -999

custom_data:
    quality_scatter:
        parent_id: "maggic-wand"
        parent_name: "MAGGIC Plots"
        parent_description: 'Publication Quality Plots generated by <a href="https://pypi.org/project/maggic-wand/" target="_blank"><code>maggic-wand</code></a> for MAG and bin quality assessment, taxonomic diversity, and AMR/MGE profiling.'
        section_name: "Quality Scatter"
        description: "Completeness vs Contamination scatter plot for all MAGs."
    genus_diversity:
        parent_id: "maggic-wand"
        section_name: "Genus Diversity"
        description: "Genus-level taxonomic composition across all MAGs."
    species_diversity:
        parent_id: "maggic-wand"
        section_name: "Species Diversity"
        description: "Species-level taxonomic composition across all MAGs."
    genus_heatmap:
        parent_id: "maggic-wand"
        section_name: "Genus Heatmap"
        description: "Genus-level abundance heatmap across samples."
    species_heatmap:
        parent_id: "maggic-wand"
        section_name: "Species Heatmap"
        description: "Species-level abundance heatmap across samples."
    amr_wordcloud:
        parent_id: "maggic-wand"
        section_name: "AMR Word Cloud"
        description: "Word cloud of detected AMR gene predictions."
    amr_class_donut:
        parent_id: "maggic-wand"
        section_name: "AMR Class Donut"
        description: "Donut chart of AMR gene class distribution."
    mge_radar:
        parent_id: "maggic-wand"
        section_name: "MGE Radar"
        description: "Radar plot of mobile genetic element profiles."
    quality_ecdf:
        parent_id: "maggic-wand"
        section_name: "Quality ECDF"
        description: "Empirical cumulative distribution of MAG quality metrics."
    completeness_contig_scatter:
        parent_id: "maggic-wand"
        section_name: "Completeness vs Contig Count"
        description: "Scatter plot of MAG completeness against contig count."

sp:
    quality_scatter:
        fn: "*quality_scatter_mqc.png"
    genus_diversity:
        fn: "*genus_diversity_mqc.png"
    species_diversity:
        fn: "*species_diversity_mqc.png"
    genus_heatmap:
        fn: "*genus_heatmap_mqc.png"
    species_heatmap:
        fn: "*species_heatmap_mqc.png"
    amr_wordcloud:
        fn: "*amr_wordcloud_mqc.png"
    amr_class_donut:
        fn: "*amr_class_donut_mqc.png"
    mge_radar:
        fn: "*mge_radar_mqc.png"
    quality_ecdf:
        fn: "*quality_ecdf_mqc.png"
    completeness_contig_scatter:
        fn: "*completeness_contig_scatter_mqc.png"

export_plots: true

# Run only these modules
run_modules:
    - fastp
    - filtlong
    - fastqc
    - custom_content

# Override module display properties via mod_cust_config
# Fields overrideable: name, info, extra, url, doi, href
module_order:
    - fastp:
          name: "fastp"
          info: "This section of the report shows read statistics <b>before</b> and <b>after</b> adapter trimming with <code>fastp</code> on SE, merged PE or concatenated PE reads."
          extra: ""
    - fastqc:
          name: "FastQC"
          info: "This section of the report shows FastQC results <b>before</b> adapter trimming on SE, merged PE or concatenated PE reads."
          extra: ""
